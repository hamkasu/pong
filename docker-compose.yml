version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://pong_user:pong_password@postgres:5432/pong_levels
      - JWT_SECRET=development-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pong_levels
      POSTGRES_USER: pong_user
      POSTGRES_PASSWORD: pong_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pong_user -d pong_levels"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data: